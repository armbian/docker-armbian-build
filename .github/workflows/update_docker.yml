name: Docker Images for Framework
#
# Update Docker images we use for building CI
#

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *' # Scheduled runs every day at 3am UTC

permissions:
  contents: write
  actions: write
  packages: write

jobs:

  docker-per-arch:

    if: ${{ github.repository_owner == 'armbian' }}
    strategy:
      fail-fast: false # let other jobs try to complete if one fails
      matrix:
        include:
          #### NOTE(rpardini): needs to be kept in-sync with the second job "join-arches" down below around line 152
          - { os: "ubuntu", release: "jammy", arch: "amd64", runner: "ubuntu-22.04" }
          - { os: "ubuntu", release: "jammy", arch: "arm64", runner: "ubuntu-22.04-arm" }
          - { os: "debian", release: "bookworm", arch: "amd64", runner: "ubuntu-24.04" }
          - { os: "debian", release: "bookworm", arch: "arm64", runner: "ubuntu-24.04-arm" }
          - { os: "debian", release: "trixie", arch: "amd64", runner: "ubuntu-24.04" }
          - { os: "debian", release: "trixie", arch: "arm64", runner: "ubuntu-24.04-arm" }
          - { os: "ubuntu", release: "noble", arch: "amd64", runner: "ubuntu-24.04" }
          - { os: "ubuntu", release: "noble", arch: "arm64", runner: "ubuntu-24.04-arm" }
          - { os: "ubuntu", release: "resolute", arch: "amd64", runner: "ubuntu-24.04" }
          - { os: "ubuntu", release: "resolute", arch: "arm64", runner: "ubuntu-24.04-arm" }
          #### riscv64: built natively on self-hosted riscv64 runners (RV64GC). Only the
          #### "supported" releases that list riscv64 in the framework's
          #### config/distributions/*/architectures. resolute (Ubuntu 26.04) is omitted:
          #### it raised the riscv64 ISA baseline to RVA23 (vector, etc.), which the
          #### RV64GC runners can't execute (SIGILL); trixie covers the riscv64 build path.
          - { os: "debian", release: "trixie", arch: "riscv64", runner: "ubuntu-24.04-riscv" }
          - { os: "ubuntu", release: "noble", arch: "riscv64", runner: "ubuntu-24.04-riscv" }
    runs-on: "${{ matrix.runner }}"
    name: "${{ matrix.release }} ${{ matrix.arch }} (${{ matrix.os }})"
    env:
      DOCKERFILE_OS: "${{ matrix.os }}"
      DOCKERFILE_RELEASE: "${{ matrix.release }}"
    steps:

      - name: Checkout Armbian Framework
        uses: actions/checkout@v7
        with:
          repository: armbian/build
          ref: main
          fetch-depth: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        id: buildx_1
        continue-on-error: true # this process is prone to failure, lets repeat it again if fails
        uses: docker/setup-buildx-action@v4

      - name: Set up Docker Buildx (retry)
        id: buildx_2
        if: steps.buildx.outcome == 'failure'
        uses: docker/setup-buildx-action@v4

      - name: Set up Docker Buildx
        id: buildx_3
        if: steps.buildx.outcome == 'failure'
        uses: docker/setup-buildx-action@v4

      - name: Docker Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }} # github username or org
          password: ${{ secrets.GITHUB_TOKEN }} # github actions builtin token. repo has to have pkg access.

      - name: Prepare
        id: prep
        run: echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Generate Dockerfile for ${{env.DOCKERFILE_OS}}:${{env.DOCKERFILE_RELEASE}} via Armbian helper script
        id: generate
        env:
          DOCKER_ARMBIAN_BASE_IMAGE: "${{env.DOCKERFILE_OS}}:${{env.DOCKERFILE_RELEASE}}" # Use this base image
          DOCKERFILE_USE_ARMBIAN_IMAGE_AS_BASE: "no" # Do NOT use the Armbian image as base  image to speed up; we're creating it here
          # Generate the Dockerfile for the IMAGE's target arch, so the helper emits
          # the right host-dependency set (e.g. no amd64 cross-compilers on riscv64,
          # which have no installation candidate there). Every job now runs on a
          # native runner of its arch, so this equals dpkg's value — kept explicit
          # for robustness and to stay correct if a job is ever emulated again.
          DOCKER_ARMBIAN_HOST_ARCH: "${{ matrix.arch }}"
        run: |
          bash ./compile.sh generate-dockerfile

      # Install GCC 13 (native + cross) alongside the default compiler on
      # releases whose default gcc is newer than 13 and breaks some vendor
      # sources: Trixie (gcc-14) and Resolute (gcc-15). Noble is skipped - its
      # default already is gcc-13. The generated Dockerfile runs as root
      # throughout (no USER switch), so appending this RUN at the end is safe.
      # The aarch64/armhf/riscv64 cross toolchains are what the amd64/arm64
      # build hosts use to cross-compile kernels & u-boot; they are skipped on
      # the riscv64 image, where the arm cross packages have no candidate (and
      # riscv64 builds natively anyway). gcc-13-arm-linux-gnueabi (soft-float,
      # C only - matching the default gcc-arm-linux-gnueabi) is for the TI K3 R5
      # first-stage SPL (tiboot3), which is built with GCC 13 to fit its SRAM.
      - name: Install GCC 13 alongside the default compiler (Trixie/Resolute)
        if: ${{ env.DOCKERFILE_RELEASE == 'trixie' || env.DOCKERFILE_RELEASE == 'resolute' }}
        run: |
          cat >> Dockerfile <<'DOCKEREOF'

          # Install GCC 13 alongside the default compiler (default gcc is newer here)
          RUN echo "--> Installing GCC 13 (native + cross) alongside the default compiler" && \
              DEBIAN_FRONTEND=noninteractive apt-get -y update && \
              DEBIAN_FRONTEND=noninteractive apt-get -y install --no-install-recommends gcc-13 g++-13 && \
              if [ "$(dpkg --print-architecture)" != "riscv64" ]; then \
                DEBIAN_FRONTEND=noninteractive apt-get -y install --no-install-recommends \
                  gcc-13-aarch64-linux-gnu g++-13-aarch64-linux-gnu \
                  gcc-13-arm-linux-gnueabi \
                  gcc-13-arm-linux-gnueabihf g++-13-arm-linux-gnueabihf \
                  gcc-13-riscv64-linux-gnu g++-13-riscv64-linux-gnu; \
              fi && \
              rm -rf /var/lib/apt/lists/*
          DOCKEREOF

      - name: Build and push ${{env.DOCKERFILE_OS}}:${{env.DOCKERFILE_RELEASE}} (first try)
        id: docker_build_first
        continue-on-error: true
        timeout-minutes: 40
        uses: docker/build-push-action@v7
        with:
          context: .
          provenance: false # until ghcr.io doesn't show provenance attestations properly, it reports an unknown/unknown "arch" instead. disable
          sbom: false # no SBOM for now, ghcr.io doesn't support it and pukes
          file: ./Dockerfile
          platforms: "linux/${{ matrix.arch }}"
          pull: true # Pull new version of base image, always; avoid bit-rot
          push: true
          labels: |
            org.opencontainers.image.title=${{ github.repository }}
            org.opencontainers.image.description=${{ github.event.repository.description }}
            org.opencontainers.image.url=${{ github.event.repository.html_url }}
            org.opencontainers.image.source=${{ github.event.repository.clone_url }}
            org.opencontainers.image.created=${{ steps.prep.outputs.created }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=${{ github.event.repository.license.spdx_id }}
          tags: ghcr.io/${{ github.repository }}:armbian-${{env.DOCKERFILE_OS}}-${{env.DOCKERFILE_RELEASE}}-${{ matrix.arch }}-latest

      - name: sleep a random amount of seconds, up to 60, if build/push failed, before trying again
        if: steps.docker_build_first.outcome == 'failure'
        run: |
          echo "::notice os=${{env.DOCKERFILE_OS}},release=${{env.DOCKERFILE_RELEASE}}::Build/push failed, retrying"
          sleep $((RANDOM % 60))

      - name: Build and push again (second try if first failed)
        id: docker_build_second
        if: steps.docker_build_first.outcome == 'failure'
        continue-on-error: false # let the build break if the two tries fail
        timeout-minutes: 40
        uses: docker/build-push-action@v7
        with:
          context: .
          provenance: false # until ghcr.io doesn't show provenance attestations properly, it reports an unknown/unknown "arch" instead. disable
          sbom: false # no SBOM for now, ghcr.io doesn't support it and pukes
          file: ./Dockerfile
          platforms: "linux/${{ matrix.arch }}"
          pull: true # Pull new version of base image, always; avoid bit-rot
          push: true
          labels: |
            org.opencontainers.image.title=${{ github.repository }}
            org.opencontainers.image.description=${{ github.event.repository.description }}
            org.opencontainers.image.url=${{ github.event.repository.html_url }}
            org.opencontainers.image.source=${{ github.event.repository.clone_url }}
            org.opencontainers.image.created=${{ steps.prep.outputs.created }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=${{ github.event.repository.license.spdx_id }}
          tags: ghcr.io/${{ github.repository }}:armbian-${{env.DOCKERFILE_OS}}-${{env.DOCKERFILE_RELEASE}}-${{ matrix.arch }}-latest

  join-arches:
    if: ${{ github.repository_owner == 'armbian' }}
    runs-on: ubuntu-latest
    needs: docker-per-arch
    # Use docker manifest to join the multi-arch images into a single manifest for each os+release
    steps:
      - name: Docker Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }} # github username or org
          password: ${{ secrets.GITHUB_TOKEN }} # github actions builtin token. repo has to have pkg access.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: ubuntu-jammy - Create and push multi-arch manifest using buildx
        run: |
          docker buildx imagetools create -t \
            ghcr.io/${{ github.repository }}:armbian-ubuntu-jammy-latest \
            ghcr.io/${{ github.repository }}:armbian-ubuntu-jammy-amd64-latest \
            ghcr.io/${{ github.repository }}:armbian-ubuntu-jammy-arm64-latest
          docker buildx imagetools inspect ghcr.io/${{ github.repository }}:armbian-ubuntu-jammy-latest

      - name: debian-bookworm - Create and push multi-arch manifest using buildx
        run: |
          docker buildx imagetools create -t \
            ghcr.io/${{ github.repository }}:armbian-debian-bookworm-latest \
            ghcr.io/${{ github.repository }}:armbian-debian-bookworm-amd64-latest \
            ghcr.io/${{ github.repository }}:armbian-debian-bookworm-arm64-latest
          docker buildx imagetools inspect ghcr.io/${{ github.repository }}:armbian-debian-bookworm-latest

      - name: debian-trixie - Create and push multi-arch manifest using buildx
        run: |
          docker buildx imagetools create -t \
            ghcr.io/${{ github.repository }}:armbian-debian-trixie-latest \
            ghcr.io/${{ github.repository }}:armbian-debian-trixie-amd64-latest \
            ghcr.io/${{ github.repository }}:armbian-debian-trixie-arm64-latest \
            ghcr.io/${{ github.repository }}:armbian-debian-trixie-riscv64-latest
          docker buildx imagetools inspect ghcr.io/${{ github.repository }}:armbian-debian-trixie-latest

      - name: ubuntu-noble - Create and push multi-arch manifest using buildx
        run: |
          docker buildx imagetools create -t \
            ghcr.io/${{ github.repository }}:armbian-ubuntu-noble-latest \
            ghcr.io/${{ github.repository }}:armbian-ubuntu-noble-amd64-latest \
            ghcr.io/${{ github.repository }}:armbian-ubuntu-noble-arm64-latest \
            ghcr.io/${{ github.repository }}:armbian-ubuntu-noble-riscv64-latest
          docker buildx imagetools inspect ghcr.io/${{ github.repository }}:armbian-ubuntu-noble-latest

      - name: ubuntu-resolute - Create and push multi-arch manifest using buildx
        run: |
          docker buildx imagetools create -t \
            ghcr.io/${{ github.repository }}:armbian-ubuntu-resolute-latest \
            ghcr.io/${{ github.repository }}:armbian-ubuntu-resolute-amd64-latest \
            ghcr.io/${{ github.repository }}:armbian-ubuntu-resolute-arm64-latest
          docker buildx imagetools inspect ghcr.io/${{ github.repository }}:armbian-ubuntu-resolute-latest

  keepalive:
    if: ${{ github.repository_owner == 'armbian' }}
    name: Keep Alive
    needs: join-arches
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v7
      - uses: liskin/gh-workflow-keepalive@v1
